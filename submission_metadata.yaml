# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  We built a Staged Hybrid Ranking Engine (SHRE) with a pure-Python Career Trajectory-Aware Engine (CTAE) fallback. 
  The SHRE pipeline filters candidates to eliminate honeypots and under-experienced candidates (Stage 1), 
  extracts 78 high-signal features across domain depth, seniority trajectory, and behavioral signals (Stage 2), 
  trains a multi-class Voting Ensemble of XGBoost, LightGBM, and CatBoost using SMOTE + BorderlineSMOTE + ADASYN data balancing (Stage 3), 
  and sorts candidates using probabilistic soft-voting to produce top 100 with dynamic non-hallucinated reasoning (Stage 4). 
  If any library or model load fails, the system automatically falls back to the pure-Python rule-based CTAE ranker.

